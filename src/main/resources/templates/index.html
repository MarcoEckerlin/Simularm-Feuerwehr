<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Simularm Feuerwehr</title>
    <link rel="stylesheet" th:href="@{/css/index.css}" href="../static/css/index.css">
</head>

<body>

    <div class="container">
        <header>
            <h1>🚒 Simularm Feuerwehr</h1>
            <p>Einsatzleitsystem für Feuerwehr-Simulationen</p>
        </header>

        <!-- Kommende Alarme -->
        <div class="top">
            <section class="alarms">
                <h2>🚨 Kommende Alarme</h2>
                <div class="alarm-list" th:if="${alarms}">
                    <div class="alarm-item" th:each="alarm : ${alarms}">
                        <div class="alarm-info">
                            <strong th:text="${alarm.fachBereich}">Fachbereich</strong> -
                            <span th:text="${alarm.meldung}">Meldung</span>
                            <div>
                                🕒 Uhrzeit: <span th:text="${alarm.timestamp}">Zeit</span>
                            </div>
                            <div>
                                🚒 Fahrzeuge: <span th:text="${alarm.forces}">Einheiten</span>
                            </div>
                            <div>
                                📍 Ort: <span th:text="${alarm.ort}">Ort</span>
                            </div>
                        </div>
                        <div class="alarm-actions">
                            <form th:action="@{/alarm/edit/{id}(id=${alarm.id})}" method="get">
                                <button class="edit" type="submit">✏️</button>
                            </form>
                            <form th:action="@{/alarm/delete/{id}(id=${alarm.id})}" method="post">
                                <button class="delete" type="submit">🗑️</button>
                            </form>
                        </div>
                    </div>
                </div>
                <p th:if="${#lists.isEmpty(alarms)}">Keine Alarme vorhanden.</p>
            </section>

            <!-- Durchsage machen -->
            <section class="durchsage">
                <h2>📢 Durchsage machen</h2>
                <form th:action="@{/alarm/durchsage}" method="post">
                    <textarea name="message" placeholder="Durchsage hier eintippen ..." cols="40" rows="4"
                        required></textarea>
                    <button type="submit">Senden</button>
                </form>
            </section>

            <!-- Einstellungen -->
            <section class="settings">
                <h2>⚙️ Einstellungen</h2>
                <form th:action="@{/alarm/settings}" method="post">
                    <input type="text" name="apiKey" placeholder="Divera API-Key hier eintragen ..." required />
                    <button type="submit">Speichern</button>
                </form>
            </section>

        </div>
        <!-- Neuen Alarm hinzufügen -->
        <div class="bottom">
            <section class="new-alarm">
            <h2>➕ Neuen Alarm hinzufügen</h2>
            <form th:action="@{/alarm/add}" method="post">
                <input type="text" name="fwName" placeholder="Feuerwehr Name" required />
                <input type="text" name="fachBereich" placeholder="Fachbereich" required />
                <input type="text" name="meldung" placeholder="Meldung" required />
                <input type="text" name="ort" placeholder="Ort" required />
                <input type="text" name="forces" placeholder="Einsatzkräfte" required />
                <input type="datetime-local" name="time" required />
                <button type="submit">Alarm speichern</button>
            </form>
        </section>
        </div>

    </div>

</body>

</html>
